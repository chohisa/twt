<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>전략 게임 인터페이스</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; }
        .screen { display: none; height: 100vh; justify-content: center; align-items: center; }
        .active { display: flex; flex-direction: column; }

        /* 홈 화면 */
        #home-screen { justify-content: center; }

        /* 인게임 화면 */
        #game-screen { justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .zone-container { display: flex; gap: 20px; }
        .zone { width: 300px; height: 200px; border: 2px solid #444; background: #261a1a; }
        
        /* 손패 영역 */
        .hand-area { display: flex; gap: 10px; padding: 20px; background: #333; }
        .card { 
            width: 80px; height: 120px; background: #4a3728; border: 1px solid #8b5a2b; 
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
        }
        /* 카드 클릭 효과 (살짝 들려진 느낌) */
        .card.selected { 
            transform: translateY(-20px) scale(1.1); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: #ffd700;
        }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <h1>전략 게임</h1>
        <button onclick="showScreen('game-screen')">게임 시작</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="zone-container">
            <div class="zone">적 초소 A</div>
            <div class="zone">적 초소 B</div>
            <div class="zone">적 초소 C</div>
        </div>
        <div class="hand-area" id="hand">
            <div class="card" onclick="selectCard(this)"></div>
            <div class="card" onclick="selectCard(this)"></div>
            <div class="card" onclick="selectCard(this)"></div>
        </div>
    </div>

    <script>
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function selectCard(cardElement) {
            // 다른 카드 선택 해제
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            // 클릭한 카드 선택
            cardElement.classList.add('selected');
        }
    </script>
</body>
</html>
