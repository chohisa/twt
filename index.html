<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>전략 게임 프로토타입</title>
    <style>
    body { font-family: 'Arial', sans-serif; background: #2c3e50; color: white; }
    #game-screen { display: flex; flex-direction: column; align-items: center; }
    
    /* 성벽 영역 */
    .fortress { width: 90%; height: 80px; background: #7f8c8d; margin: 10px; border-radius: 5px; display: flex; justify-content: center; align-items: center; }
    
    /* 중앙 접전지 */
    .battle-area { display: flex; justify-content: space-around; width: 100%; margin: 20px 0; }
    .zone { width: 80px; height: 120px; border: 3px solid #e74c3c; background: #ecf0f1; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 10px; }
</style>

<div id="game-screen" class="screen">
    <div class="fortress">적의 성벽 (AI)</div>
    
    <div class="battle-area">
        <div class="zone">접전지 A<br>HP: 6</div>
        <div class="zone">접전지 B<br>HP: 8</div>
        <div class="zone">접전지 C<br>HP: 4</div>
    </div>
    
    <div class="fortress">나의 성벽 (플레이어)</div>
</div>
</head>
<body>

    <div id="home-screen" class="screen active">
        <h1>군수 카드 전략 게임</h1>
        <button onclick="showScreen('game-screen')">게임 시작</button>
    </div>

    <div id="game-screen" class="screen">
        <h2>접전지 상황</h2>
        <div class="zone">A지역<br>HP: 6</div>
        <div class="zone">B지역<br>HP: 8</div>
        <div class="zone">C지역<br>HP: 4</div>
        <br>
        <button onclick="showScreen('home-screen')">홈으로 돌아가기</button>
    </div>

    <script>
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
    </script>
</body>
</html>
