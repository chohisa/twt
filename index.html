<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>전략 게임 프로토타입</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; }
        .screen { display: none; padding: 20px; }
        .active { display: block; }
        .zone { display: inline-block; width: 100px; height: 150px; border: 2px solid #333; margin: 10px; background: white; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <h1>군수 카드 전략 게임</h1>
        <button onclick="showScreen('game-screen')">게임 시작</button>
    </div>

    <div id="game-screen" class="screen">
        <h2>접전지 상황</h2>
        <div class="zone">A지역<br>HP: 6</div>
        <div class="zone">B지역<br>HP: 8</div>
        <div class="zone">C지역<br>HP: 4</div>
        <br>
        <button onclick="showScreen('home-screen')">홈으로 돌아가기</button>
    </div>

    <script>
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
    </script>
</body>
</html>
