<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전략 전쟁 (로컬 엔진 빌드)</title>
    <style>
        :root {
            --bg-color: #121214;
            --panel-bg: #1e1e24;
            --card-bg: #2a2a32;
            --text-color: #e2e8f0;
            --accent-color: #e53e3e; 
            --blue-color: #3182ce;   
            --color-unit: #2b3e50;      
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .main-menu {
            width: 100%;
            max-width: 500px;
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 40px 30px;
            text-align: center;
            border: 1px solid #2d3748;
        }
        .start-btn {
            background: linear-gradient(135deg, var(--accent-color), #b7791f);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
        .game-container { display: none; width: 100%; max-width: 950px; background-color: var(--panel-bg); border-radius: 12px; padding: 20px; }
        .score-board { background: #1a202c; padding: 12px; border-radius: 8px; text-align: center; font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; border: 1px solid #4a5568; }
        .score-board span { color: var(--accent-color); }
        .faction-info { background-color: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 6px; margin-bottom: 15px; display: flex; justify-content: space-between; font-size: 0.95rem; border-left: 4px solid var(--accent-color); }
        .faction-info.player { border-left-color: var(--blue-color); }
        .battlefield { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .zone { background-color: rgba(0,0,0,0.2); border-radius: 8px; padding: 10px; border: 1px solid #3f444e; text-align: center; min-height: 220px; display: flex; flex-direction: column; justify-content: space-between; }
        .zone.ai-target:hover { border-color: var(--accent-color); background-color: rgba(229, 62, 62, 0.05); cursor: crosshair; }
        .zone-title { font-weight: bold; margin-bottom: 5px; color: #cbd5e0; }
        .zone-hp { font-size: 0.9rem; margin-bottom: 8px; color: #a0aec0; }
        .card-slot-wrapper { display: flex; flex-direction: column; gap: 6px; width: 100%; }
        .card-slot { background-color: var(--card-bg); padding: 8px; border-radius: 6px; font-size: 0.85rem; border: 1px solid #4a5568; }
        .card-slot.empty-slot { border: 1px solid #3d4654!important; color: #5d6d82!important; background-color: rgba(20, 20, 25, 0.6)!important; }
        .card-slot.hidden-card { background: repeating-linear-gradient(45deg, #2d3748, #2d3748 10px, #222831 10px, #222831 20px); color: #a0aec0; }
        .center-line { grid-column: span 3; text-align: center; font-size: 0.8rem; color: #718096; padding: 5px 0; }
        .zone.captured-player { background: linear-gradient(180deg, #1A365D, #2B6CB0)!important; border-color: var(--blue-color); justify-content: center; align-items: center;}
        .zone.captured-ai { background: linear-gradient(180deg, #742A2A, #9B2C2C)!important; border-color: var(--accent-color); justify-content: center; align-items: center;}
        .captured-msg { font-weight: bold; font-size: 1.1rem; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .hand-container { background-color: #1a202c; padding: 20px 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #2d3748; }
        .hand-cards { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .real-card { width: 110px; height: 150px; border-radius: 8px; padding: 12px 8px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; border: 2px solid #cbd5e0; background-color: var(--color-unit); }
        .real-card.selected-card { border-color: #f6ad55!important; box-shadow: 0 0 15px #f6ad55; transform: translateY(-10px); }
        .card-name { font-size: 0.95rem; font-weight: bold; text-align: center; margin: auto 0; }
        .bottom-panel { display: grid; grid-template-columns: 40% 60%; border-top: 1px solid #4a5568; padding-top: 15px; gap: 15px; }
        .panel-box { background-color: rgba(0,0,0,0.15); padding: 12px; border-radius: 6px; border: 1px solid #2d3748; font-size: 0.85rem; }
        .log-content { height: 95px; overflow-y: auto; color: #a0aec0; font-family: monospace; }
        .log-line.system { color: #f6ad55; }
        .log-line.player-log { color: #63b3ed; }
        .log-line.ai-log { color: #fc8181; }
    </style>
</head>
<body>

    <div class="main-menu" id="mainMenu">
        <h1>전략 전쟁</h1>
        <div style="color: #a0aec0; margin-bottom: 30px;">분리형 엔진 빌드 v1.0</div>
        <button class="start-btn" onclick="startGame()">게임 시작</button>
    </div>

    <div class="game-container" id="gameScreen">
        <div class="score-board">
            스코어 - 플레이어 <span id="p-score">0</span> : <span id="ai-score">0</span> AI
        </div>

        <div class="faction-info">[ AI 진영 ]</div>
        <div class="battlefield">
            <div class="zone ai" id="zone-A-ai" onclick="targetZone('A')">
                <div class="zone-title">[접전지 A]</div>
                <div class="card-slot-wrapper" id="slots-A-ai"></div>
                <div class="zone-hp" id="hp-A-ai">HP: 4/4</div>
            </div>
            <div class="zone ai" id="zone-B-ai" onclick="targetZone('B')">
                <div class="zone-title">[접전지 B]</div>
                <div class="card-slot-wrapper" id="slots-B-ai"></div>
                <div class="zone-hp" id="hp-B-ai">HP: 8/8</div>
            </div>
            <div class="zone ai" id="zone-C-ai" onclick="targetZone('C')">
                <div class="zone-title">[접전지 C]</div>
                <div class="card-slot-wrapper" id="slots-C-ai"></div>
                <div class="zone-hp" id="hp-C-ai">HP: 4/4</div>
            </div>

            <div class="center-line">--------------------------------------------------</div>

            <div class="zone player" id="zone-A-player">
                <div class="zone-title">[접전지 A]</div>
                <div class="card-slot-wrapper" id="slots-A-player"></div>
                <div class="zone-hp" id="hp-A-player">HP: 4/4</div>
            </div>
            <div class="zone player" id="zone-B-player">
                <div class="zone-title">[접전지 B]</div>
                <div class="card-slot-wrapper" id="slots-B-player"></div>
                <div class="zone-hp" id="hp-B-player">HP: 8/8</div>
            </div>
            <div class="zone player" id="zone-C-player">
                <div class="zone-title">[접전지 C]</div>
                <div class="card-slot-wrapper" id="slots-C-player"></div>
                <div class="zone-hp" id="hp-C-player">HP: 4/4</div>
            </div>
        </div>

        <div class="faction-info player">[ 플레이어 진영 ]</div>
        <div class="hand-container">
            <div class="hand-cards">
                <div class="real-card" id="card-보병" onclick="selectHandCard('보병')"><div class="card-name">보병</div></div>
                <div class="real-card" id="card-창병" onclick="selectHandCard('창병')"><div class="card-name">창병</div></div>
                <div class="real-card" id="card-기병" onclick="selectHandCard('기병')"><div class="card-name">기병</div></div>
                <div class="real-card" id="card-궁병" onclick="selectHandCard('궁병')"><div class="card-name">궁병</div></div>
            </div>
        </div>

        <div class="bottom-panel">
            <div class="panel-box">
                <b>⚔️ 상성 규칙</b><br>보병 > 창병 > 기병 > 궁병 > 보병
            </div>
            <div class="panel-box">
                <b>📜 실시간 전투 로그</b>
                <div class="log-content" id="log-box"></div>
            </div>
        </div>
    </div>

    <script src="game_engine.js"></script>
</body>
</html>
